services:
  backend:
    container_name: sdm-backend-container
    image: back-img
    restart: always
    ports:
      - "8000:8080"
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/tmp/keys/vertex-ai-access-key.json
    volumes:
      - /tmp/keys/vertex-ai-access-key.json:/keys/vertex-ai-access-key.json:ro

networks:
  backend-network:
    external: true

volumes:
  /tmp/keys/vertex-ai-access-key.json:
