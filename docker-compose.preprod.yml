services:
  backend:
    container_name: sdm-backend-container
    image: back-img
    restart: always
    ports:
      - "8000:8080"
    environment:
      # - GOOGLE_APPLICATION_CREDENTIALS=/studymate-backend/tmp/keys/vertex-ai-access-key.json
      - GOOGLE_APPLICATION_CREDENTIALS=/app/studymate-backend/keys/vertex-ai-access-key.json
    volumes:
      - ./studymate-backend/tmp/keys/vertex-ai-access-key.json:/app/studymate-backend/keys/vertex-ai-access-key.json:ro
      - ../studymate-backend/studymate-backend:/app/studymate-backend
    networks:
      - backend-network

networks:
  backend-network:
    external: true
