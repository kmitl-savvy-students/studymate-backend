services:
  backend:
    container_name: sdm-backend-container
    image: back-img
    restart: always
    ports:
      - "8000:8080"
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/vertex-ai-access-key.json
    volumes:
      - ./studymate-backend/tmp/keys/vertex-ai-access-key.json:/app/vertex-ai-access-key.json:ro
    networks:
      - backend-network
    labels:
      traefik.enable: "true"
      traefik.http.services.backend.loadbalancer.server.port: "8080"
      traefik.http.services.backend.loadbalancer.server.scheme: "http"
      traefik.http.routers.backend-https.entrypoints: "websecure"
      traefik.http.routers.backend-https.rule: "Host( `preprod-backend.tntdverse.com` )"
      traefik.http.routers.backend-https.tls: "true"
      traefik.http.routers.backend-https.tls.certresolver: "cloudflare"

networks:
  backend-network:
    external: true
  frontend-network:
    external: true
