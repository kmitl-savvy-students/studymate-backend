services:
  backend:
    container_name: sdm-backend-prod-container
    image: back-prod-img
    restart: always
    ports:
      - "8000:8080"
    env_file:
      - /home/admin-prod/backend/.env
    networks:
      - backend-network
    labels:
      traefik.enable: "true"
      traefik.http.services.sdm-backend.loadbalancer.server.port: "8080"
      traefik.http.services.sdm-backend.loadbalancer.server.scheme: "http"
      traefik.http.routers.sdm-backend-https.entrypoints: "websecure"
      traefik.http.routers.sdm-backend-https.rule: "Host(`prod.backend.savvystudymate.com`) || Host(`backend.savvystudymate.com`)"
      traefik.http.routers.sdm-backend-https.tls: "true"
      traefik.http.routers.sdm-backend-https.tls.certresolver: "cloudflare"

networks:
  backend-network:
    external: true
  frontend-network:
    external: true
