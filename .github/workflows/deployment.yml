    #     if: success() || failure()
    #     with:
    #       name: .NET xUnit Test
    #       path: "**/test-results.trx"
    #       reporter: dotnet-trx
    #       fail-on-error: true
    #       fail-on-empty: false

  sonarqube:
    name: SonarQube Analyze
    needs: test
    runs-on: ["self-hosted", "org-runner"]
    container:
      image: mcr.microsoft.com/dotnet/sdk:8.0
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up JDK 17
        uses: actions/setup-java@v1
        with:
          java-version: 17

      - name: Cache SonarQube packages
        uses: actions/cache@v1
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarQube scanner
        id: cache-sonar-scanner
        uses: actions/cache@v1
        with:
          path: .sonar/scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarQube scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        run: |
          mkdir -p .sonar/scanner
          dotnet tool update dotnet-sonarscanner --tool-path .sonar/scanner

      - name: Build and analyze
        run: |
          .sonar/scanner/dotnet-sonarscanner begin /k:"kmitl-savvy-students_studymate-backend_2c8cb903-e9a7-4060-8cf0-94439c275333" /d:sonar.token="${{ secrets.SONAR_TOKEN }}" /d:sonar.host.url="${{ secrets.SONAR_HOST_URL }}" /d:sonar.scanner.scanAll=false /d:sonar.verbose=true /d:sonar.sources="src/" /d:sonar.exclusions="**/*.json" 
          dotnet build
          .sonar/scanner/dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"


          
  deploy:
    name : Deploy
    needs: sonarqube
    runs-on:
      labels: ["self-hosted", "Linux", "X64", "back-runner"]

    steps:
      - name: Stop and Remove Container
        run: |
          docker stop sdm-backend-container | true
          docker rm sdm-backend-container | true
      - name: Run Docker Container
        run: |
          docker run -d -p 8000:8080 --name sdm-backend-container --restart=always back-img
      - name: Assign container network
        run: |
          docker network connect backend-network sdm-backend-container
      - name: ✅✅ Finish ✅✅
        run: echo "All Passed => Fisnish !!"