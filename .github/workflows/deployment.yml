# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: StudyMate-Backend CICD

on:
    push:
      branches:
        - develop
    workflow_dispatch:
    

jobs:
    
    build:
        name: Build
        # needs: sonarqube
        runs-on:
            labels: ["self-hosted", "Linux", "X64", "back-runner"]
    
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
    
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v2
    
            - name: Build Docker Image
              run: |
                docker build -f Dockerfile.prod -t back-img .
    deploy:
        name: Deploy
        needs: build
        runs-on:
          labels: ["self-hosted", "Linux", "X64", "back-runner"]
        
        steps:
            - name: Stop and Remove Container
              run: |
                docker stop sdm-backend-container | true
                docker rm sdm-backend-container | true
    
            - name: Run Docker Container
              run: |
                docker run -d -p 8000:8080 --name sdm-backend-container --restart=always back-img 
    
            - name: Assign container network
              run: |
                docker network connect backend-network sdm-backend-container
    
            - name: ✅✅ Finish ✅✅
              run: echo "All Passed => Fisnish !!"