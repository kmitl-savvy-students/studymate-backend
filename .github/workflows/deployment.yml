  test:
    name: xUnit Testing
    needs: build
    runs-on:
      labels: ["self-hosted", "Linux", "X64", "back-runner"]
    container:
      image: mcr.microsoft.com/dotnet/sdk:8.0
    steps:
      - name: Configure Git safe directory
        run: |
          git config --global --add safe.directory /__w/studymate-backend/studymate-backend
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Restore dependencies
        run: dotnet restore studymate-backend.sln
      - name: Build the project
        run: dotnet build studymate-backend.sln --no-restore
      - name: Test
        run: dotnet test ./Tests/Tests.csproj --logger "trx" --no-build --verbosity normal 
      - name: Test Reporter
        uses: dorny/test-reporter@v1.9.1
        if: success() || failure()
        with:
          name: .NET xUnit Test
          path: "**/*.trx"
          reporter: dotnet-trx
          fail-on-error: true
          fail-on-empty: false
      - name: cleaning project
        run: |
          rm -rf bin/
          rm -rf obj/

  sonarqube:
    name: SonarQube Analyze
    needs: test
    runs-on: ["self-hosted", "org-runner"]
    container:
      image: mcr.microsoft.com/dotnet/sdk:8.0
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up JDK 17
        uses: actions/setup-java@v1
        with:
          java-version: 17

      - name: Cache SonarQube packages
        uses: actions/cache@v1
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarQube scanner
        id: cache-sonar-scanner
        uses: actions/cache@v1
        with:
          path: .sonar/scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarQube scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        run: |
          mkdir -p .sonar/scanner
          dotnet tool update dotnet-sonarscanner --tool-path .sonar/scanner

      - name: Build and analyze
        run: |
          .sonar/scanner/dotnet-sonarscanner begin /k:"kmitl-savvy-students_studymate-backend_9cb6e3af-69ca-4169-ab00-b313f0119e1e" /d:sonar.token="${{ secrets.SONAR_TOKEN }}" /d:sonar.host.url="${{ secrets.SONAR_HOST_URL }}" /d:sonar.scanner.scanAll=false /d:sonar.verbose=true
          dotnet build .
          .sonar/scanner/dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
          

  deploy:
    name : Deploy
    needs: sonarqube
    runs-on:
      labels: ["self-hosted", "Linux", "X64", "back-runner"]

    steps:
      - name: Stop and Remove Container
        run: |
          docker stop sdm-backend-container | true
          docker rm sdm-backend-container | true
      - name: Run Docker Container
        run: |
          docker run -d -p 8000:8080 --name sdm-backend-container --restart=always back-img
      - name: Assign container network
        run: |
          docker network connect backend-network sdm-backend-container
      - name: ✅✅ Finish ✅✅
        run: echo "All Passed => Fisnish !!"