# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: StudyMate-Backend CICD

on:
    workflow_dispatch:

jobs:
    sonarqube:
        name: SonarQube Analysis
        runs-on: [ 'self-hosted', 'org-runner' ]
        
        steps:
          - uses: actions/checkout@v4
            with:
              fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
          - name: Set up JDK 17
            uses: actions/setup-java@v1
            with:
              java-version: 17
          - name: Cache SonarQube packages
            uses: actions/cache@v1
            with:
              path: ~\.sonar\cache
              key: ${{ runner.os }}-sonar
              restore-keys: ${{ runner.os }}-sonar
          - name: Cache SonarQube scanner
            id: cache-sonar-scanner
            uses: actions/cache@v1
            with:
              path: .\.sonar\scanner
              key: ${{ runner.os }}-sonar-scanner
              restore-keys: ${{ runner.os }}-sonar-scanner
          # - name: Install SonarQube scanner
          #   if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
          #   shell: powershell
          #   run: |
          #     New-Item -Path .\.sonar\scanner -ItemType Directory
          #     dotnet tool update dotnet-sonarscanner --tool-path .\.sonar\scanner
          # - name: Build and analyze
          #   shell: powershell
          #   run: |
          #     .\.sonar\scanner\dotnet-sonarscanner begin /k:"kmitl-savvy-students_studymate-backend_b3b5cf4a-44d9-4314-956f-2e95d436c401" /d:sonar.token="${{ secrets.SONAR_TOKEN }}" /d:sonar.host.url="${{ secrets.SONAR_HOST_URL }}"
          #     dotnet build
          #     .\.sonar\scanner\dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
          - name: Setup .NET Core SDK
            uses: actions/setup-dotnet@v3
            with:
                dotnet-version: '8.0.7' 
          - name: Install SonarQube scanner
            if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
            run: |
                mkdir -p .sonar/scanner
                dotnet tool update dotnet-sonarscanner --tool-path .sonar/scanner
          - name: Build and analyze
            run: |
                .sonar/scanner/dotnet-sonarscanner begin /k:"kmitl-savvy-students_studymate-backend_b3b5cf4a-44d9-4314-956f-2e95d436c401" /d:sonar.token="${{ secrets.SONAR_TOKEN }}" /d:sonar.host.url="${{ secrets.SONAR_HOST_URL }}"
                dotnet build
                .sonar/scanner/dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

    build:
        name: Build and Deploy Backend
        needs: sonarqube
        runs-on:
            labels: ["self-hosted", "Linux", "X64", "back-runner"]
    
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
    
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v2
    
            - name: Build Docker Image
              run: |
                docker build -f Dockerfile.prod -t back-img .
    
            - name: Stop and Remove Container
              run: |
                docker stop sdm-backend-container | true
                docker rm sdm-backend-container | true
    
            - name: Run Docker Container
              run: |
                docker run -d -p 8000:8080 --name sdm-backend-container --restart=always back-img 
    
            - name: Assign container network
              run: |
                docker network connect backend-network sdm-backend-container
    
            - name: ✅✅ Finish ✅✅
              run: echo "All Passed => Fisnish !!"
