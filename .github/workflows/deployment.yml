  build:
    name: Build
    # needs: sonarqube
    runs-on:
      labels: ["self-hosted", "Linux", "X64", "back-runner"]
    steps:
      - name: give runner permission
        run: |
          sudo chown -R admin-preprod:admin-preprod /home/admin-preprod/actions-runner/_work/studymate-backend/studymate-backend
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker Image
        run: |
          docker build -f Dockerfile.preprod -t back-img .
          
  deploy:
    name : Deploy
    needs: build
    runs-on:
      labels: ["self-hosted", "Linux", "X64", "back-runner"]

    steps:
      - name: Stop and Remove Container
        run: |
          docker compose -f docker-compose.preprod.yml down -v | true
      - name: Create Directory To Store File
        run: |
          mkdir -p ./studymate-backend/tmp/keys
          sudo chown -R admin-preprod:admin-preprod /home/admin-preprod/actions-runner/_work/studymate-backend/studymate-backend/studymate-backend/tmp/keys
      - name: Create Google Credentials File
        id: create-json
        uses: jsdaniell/create-json@v1.2.3
        with:
          name: "vertex-ai-access-key.json"
          json: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
          dir: '/studymate-backend/tmp/keys/'
      - name: list directory
        run: ls
      - name: Wait for file creation
        run: sleep 10
      - name: Verify JSON File Content
        run: cat /studymate-backend/studymate-backend/tmp/keys/vertex-ai-access-key.json         
      - name: Deploy application using Docker Compose
        run: |
          docker compose -f docker-compose.preprod.yml up -d --build
      - name: Clean up credentials file
        run: rm -f /studymate-backend/studymate-backend/tmp/keys/vertex-ai-access-key.json
      - name: ✅✅ Finish ✅✅
        run: echo "All Passed => Fisnish !!"



